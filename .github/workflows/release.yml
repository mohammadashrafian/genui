name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write       # Push version commits and tags
  pull-requests: write  # Create "Version Packages" PR
  id-token: write       # OIDC token for npm Trusted Publishing

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest

    if: github.repository == 'mohammadashrafian/genuikit'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Run tests
        run: pnpm turbo test --filter='./packages/*'

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: echo "skip-changesets-publish"
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm with OIDC provenance
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          for pkg in core react adapters cli; do
            echo "=== Publishing @genuikit/$pkg ==="
            cd packages/$pkg
            npm publish --provenance --access public
            cd ../..
          done
